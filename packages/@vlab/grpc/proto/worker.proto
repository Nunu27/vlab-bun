syntax = "proto3";

package vlab.worker;

service WorkerService {
  rpc ListenCommand(stream CommandPayload) returns (stream CommandRequest);
  rpc SendMetrics(MetricsRequest) returns (MetricsResponse);
}

message WorkerSpec {
  int32 cpu_cores = 1;
  int32 memory_mb = 2;
  int32 storage_mb = 3;
  string guacd_host = 4;
  int32 guacd_port = 5;
}

message CommandPayload {
  oneof command {
    WorkerSpec worker_spec = 1;
    bytes payload = 2;
  }
}

message CommandRequest {
  bytes payload = 1;
}

message MetricsRequest {
  double cpu_usage_percent = 1;
  double memory_usage_percent = 2;
  double storage_usage_percent = 3;
  double score = 4;
  int32 active_labs = 5;
  int32 active_nodes = 6;
}

message MetricsResponse {
  bool success = 1;
}
