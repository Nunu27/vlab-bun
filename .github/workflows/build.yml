name: Build vLab

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "docker-compose.yml"
      - ".agents/**"
      - ".devtool/**"
      - ".gitignore"
      - ".dockerignore"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      evaluator: ${{ steps.filter.outputs.evaluator }}
      modules: ${{ steps.filter.outputs.modules }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            evaluator:
              - 'packages/@vlab/evaluator/**'
              - 'tests/evaluator-e2e/**'
            modules:
              - 'docs/modules/**'
              - 'packages/@vlab/evaluator/**'
              - 'tests/modules-e2e/**'

  evaluator-test:
    needs: changes
    if: ${{ needs.changes.outputs.evaluator == 'true' }}
    name: Evaluator E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Containerlab
        run: bash -c "$(curl -sL https://get.containerlab.dev)"

      - name: Add runner to clab_admins
        run: sudo usermod -aG clab_admins runner

      - name: Install dependencies
        run: bun install
        working-directory: ./tests/evaluator-e2e

      - name: Run E2E Tests
        run: sg clab_admins -c "bun run test"
        working-directory: ./tests/evaluator-e2e

  modules-test:
    needs: changes
    if: ${{ needs.changes.outputs.modules == 'true' }}
    name: Modules E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Containerlab
        run: bash -c "$(curl -sL https://get.containerlab.dev)"

      - name: Add runner to clab_admins
        run: sudo usermod -aG clab_admins runner

      - name: Pull container images
        run: |
          docker pull ghcr.io/nunu27/vrnetlab/vr-routeros
          docker pull ghcr.io/nunu27/docker-remote-desktop:ssh-ubuntu-24.04

      - name: Install dependencies
        run: bun install
        working-directory: ./tests/modules-e2e

      - name: Run E2E Tests
        run: sg clab_admins -c "bun run test"
        working-directory: ./tests/modules-e2e

  build-and-push:
    needs: [changes, evaluator-test, modules-test]
    if: |
      always() &&
      (needs.evaluator-test.result == 'success' || needs.evaluator-test.result == 'skipped') &&
      (needs.modules-test.result == 'success' || needs.modules-test.result == 'skipped') &&
      needs.changes.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [manager, worker, installer]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.component }}
