name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ vars.DOCKER_PLATFORMS || 'linux/arm64' }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            # Colors for output
            GREEN='\033[0;32m'
            BLUE='\033[0;34m'
            YELLOW='\033[1;33m'
            NC='\033[0m'

            echo -e "${BLUE}📦 Deploying vLab...${NC}"

            # Login to GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>&1 | grep -v "credentials are stored unencrypted" || true

            # Convert repository name to lowercase for Docker
            IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}:main" | tr '[:upper:]' '[:lower:]')

            # Pull the latest image
            echo -e "${BLUE}→ Pulling image...${NC}"
            docker pull "$IMAGE_NAME"

            # Stop and remove old container if exists
            echo -e "${BLUE}→ Stopping old container...${NC}"
            docker stop vlab 2>/dev/null || true
            docker rm vlab 2>/dev/null || true

            # Load environment variables
            set -a
            source ${{ secrets.VPS_DEPLOY_PATH }}/.env
            set +a

            # Build network flags from DOCKER_NETWORKS env var
            NETWORK_FLAGS=""
            if [ -n "${DOCKER_NETWORKS:-}" ]; then
              IFS=',' read -ra NETWORKS <<< "$DOCKER_NETWORKS"
              for network in "${NETWORKS[@]}"; do
                network=$(echo "$network" | xargs)  # trim whitespace
                NETWORK_FLAGS="$NETWORK_FLAGS --network $network"
              done
            else
              # Default to bridge if not specified
              NETWORK_FLAGS="--network bridge"
            fi

            # Build port binding flag (optional)
            PORT_FLAG=""
            if [ -n "${BIND_PORT:-}" ]; then
              PORT_FLAG="-p ${BIND_PORT}:3000"
            fi

            # Run new container
            echo -e "${BLUE}→ Starting new container...${NC}"
            docker run -d \
              --name vlab \
              --restart unless-stopped \
              --sysctl net.ipv6.conf.all.disable_ipv6=1 \
              $NETWORK_FLAGS \
              $PORT_FLAG \
              --env-file ${{ secrets.VPS_DEPLOY_PATH }}/.env \
              "$IMAGE_NAME"

            # Wait for health check
            sleep 5

            # Verify container is running
            if [ "$(docker inspect -f '{{.State.Running}}' vlab)" = "true" ]; then
              echo -e "${GREEN}✅ Deployment completed successfully!${NC}"
              echo -e "${BLUE}Commit: ${{ github.sha }}${NC}"
            else
              echo -e "${YELLOW}❌ Container failed to start${NC}"
              docker logs vlab --tail=50
              exit 1
            fi

            # Clean up old images
            echo -e "${BLUE}→ Cleaning up old images...${NC}"
            docker image prune -af --filter "until=24h"

            echo -e "${GREEN}🎉 Done!${NC}"
