name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ vars.DOCKER_PLATFORMS || 'linux/amd64' }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Login to GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin 2>&1 | grep -v "credentials are stored unencrypted" || true

            # Convert repository name to lowercase for Docker
            IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}:main" | tr '[:upper:]' '[:lower:]')

            # Pull the latest image
            docker pull "$IMAGE_NAME"

            # Stop and remove old container if exists
            docker stop vlab || true
            docker rm vlab || true

            # Load environment variables
            set -a
            source ${{ secrets.VPS_DEPLOY_PATH }}/.env
            set +a

            # Build network flags from DOCKER_NETWORKS env var
            NETWORK_FLAGS=""
            if [ -n "${DOCKER_NETWORKS:-}" ]; then
              IFS=',' read -ra NETWORKS <<< "$DOCKER_NETWORKS"
              for network in "${NETWORKS[@]}"; do
                network=$(echo "$network" | xargs)  # trim whitespace
                NETWORK_FLAGS="$NETWORK_FLAGS --network $network"
              done
            else
              # Default to bridge if not specified
              NETWORK_FLAGS="--network bridge"
            fi

            # Build port binding flag (optional)
            PORT_FLAG=""
            if [ -n "${BIND_PORT:-}" ]; then
              PORT_FLAG="-p ${BIND_PORT}:3000"
            fi

            # Run new container
            docker run -d \
              --name vlab \
              --restart unless-stopped \
              $NETWORK_FLAGS \
              $PORT_FLAG \
              --env-file ${{ secrets.VPS_DEPLOY_PATH }}/.env \
              -e NODE_ENV=production \
              "$IMAGE_NAME"

            # Wait for health check
            sleep 5

            # Verify container is running
            if [ "$(docker inspect -f '{{.State.Running}}' vlab)" = "true" ]; then
              echo "✅ Deployment completed successfully!"
            else
              echo "❌ Container failed to start"
              docker logs vlab --tail=50
              exit 1
            fi

            # Clean up old images
            docker image prune -af --filter "until=24h"
