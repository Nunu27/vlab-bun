version: "3.8"

networks:
  vlab-network:
    driver: overlay
    attachable: true
  clab-mgmt:
    name: clab-mgmt
    driver: overlay
    attachable: true

volumes:
  vlab-topologies:
  postgres-data:
  redis-data:
  rustfs-data:
  proxy-conf:
  proxy-vhost:
  proxy-html:
  proxy-certs:
  proxy-acme:

services:
  # ==========================================
  # vLab Core Services
  # ==========================================
  manager:
    image: ghcr.io/nunu27/vlab-bun-manager:latest
    env_file:
      - .env.manager
    environment:
      - NODE_ENV=production
      - MANAGER_ID={{.Node.Hostname}}
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
    networks:
      - vlab-network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  worker:
    image: ghcr.io/nunu27/vlab-bun-worker:latest
    env_file:
      - .env.worker
    environment:
      - NODE_ENV=production
      - WORKER_ID={{.Node.Hostname}}
      - MANAGER_GRPC_URL=http://manager:50051
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
      - CLAB_CLI_PATH=/app/containerlab
      - CLAB_TOPOLOGIES_PATH=/app/lab
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - vlab-topologies:/app/lab
    networks:
      - vlab-network
      - clab-mgmt
    deploy:
      mode: global
      restart_policy:
        condition: any

  guacd:
    image: linuxserver/guacd:latest
    networks:
      - vlab-network
      - clab-mgmt
    deploy:
      mode: global
      restart_policy:
        condition: any

  # ==========================================
  # Backing Services
  # ==========================================
  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD:-vlab}
      - POSTGRES_USER=${DB_USER:-vlab}
      - POSTGRES_DB=${DB_NAME:-vlab}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vlab-network
    deploy:
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    networks:
      - vlab-network
    deploy:
      placement:
        constraints:
          - node.role == manager

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      - RUSTFS_VOLUMES=/data/rustfs
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_ACCESS_KEY=${S3_ACCESS_KEY:-admin}
      - RUSTFS_SECRET_KEY=${S3_SECRET_KEY:-password123}
    volumes:
      - rustfs-data:/data/rustfs
    networks:
      - vlab-network
    deploy:
      placement:
        constraints:
          - node.role == manager

  # ==========================================
  # Proxy & SSL (3 Service Setup)
  # ==========================================
  nginx-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - proxy-vhost:/etc/nginx/vhost.d
      - proxy-conf:/etc/nginx/conf.d
      - proxy-html:/usr/share/nginx/html
      - proxy-certs:/etc/nginx/certs:ro
    networks:
      - vlab-network
    deploy:
      placement:
        constraints:
          - node.role == manager

  docker-gen:
    image: nginxproxy/docker-gen
    command: -notify-sighup nginx-proxy -watch -wait 5s:30s /etc/docker-gen/templates/nginx.tmpl /etc/nginx/conf.d/default.conf
    volumes:
      - proxy-vhost:/etc/nginx/vhost.d
      - proxy-conf:/etc/nginx/conf.d
      - proxy-html:/usr/share/nginx/html
      - proxy-certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
      # Docker-gen requires the template file. In swarm, we typically bind mount or use configs.
      # Assuming template is fetched by deploy script to /opt/vlab/nginx.tmpl
      - ./nginx.tmpl:/etc/docker-gen/templates/nginx.tmpl:ro
    networks:
      - vlab-network
    deploy:
      placement:
        constraints:
          - node.role == manager
    labels:
      - "com.github.nginx-proxy.docker-gen"

  acme-companion:
    image: nginxproxy/acme-companion
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - proxy-vhost:/etc/nginx/vhost.d
      - proxy-conf:/etc/nginx/conf.d
      - proxy-html:/usr/share/nginx/html
      - proxy-certs:/etc/nginx/certs:rw
      - proxy-acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - vlab-network
    deploy:
      placement:
        constraints:
          - node.role == manager
